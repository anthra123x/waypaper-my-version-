name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: electron-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: electron-app/package-lock.json

      - run: npm ci

      - run: npm run build

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: npx electron-builder --win --publish=never

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: npx electron-builder --linux --publish=never

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes 2>/dev/null || true
          find dist/ -type f \( -name '*.exe' -o -name '*.AppImage' \) |
          while IFS= read -r f; do
            echo "Uploading: $f"
            gh release upload "${{ github.ref_name }}" "$f" --clobber || true
          done
