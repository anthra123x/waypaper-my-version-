appId: com.waypaper.app
productName: Waypaper
directories:
  output: dist
  buildResources: resources
files:
  - out/**/*
  - "!node_modules/**/*"
win:
  target:
    - portable
  icon: resources/icon.png
  artifactName: ${productName}-${version}-portable.${ext}
linux:
  target:
    - AppImage
  icon: resources/icon.png
mac:
  target:
    - dmg
  icon: resources/icon.png
